<!doctype html>
<html>
	<head>
		<meta charset="utf-8">
		<meta name="description" content="">
		<meta name="viewport" content="width=device-width, initial-scale=1">
		<title>CS171 - Introduction to JavaScript</title>

		<!-- Load CSS libraries -->
		<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
		<link rel="stylesheet" href="css/style.css">

		<!-- GOOGLE FONTS -->
		<link href='https://fonts.googleapis.com/css?family=Roboto:400,100,300,500,400italic,300italic' rel='stylesheet' type='text/css'>
		<link href='https://fonts.googleapis.com/css?family=Satisfy' rel='stylesheet' type='text/css'>
	</head>
	<body>



	<div class="container-fluid vh-100 d-flex flex-column justify-content-center" style="background: white">

		<!-- Full width row with three columns -->
		<div class="row" style="">
			<!-- Left empty column -->
			<div class="col-2" ></div>

			<!-- Center column containing all the contents -->
			<div class="col-8" style="background: #e0e4e8;">

				<!-- header -->
				<div class="row" style="background: #f4f4f6; ">
					<div class="col text-center">
						<h2>Theme Parks, Water Parks and Museums</h2>
						<h1>Global Attractions Attendance</h1>
					</div>
				</div>

				<!-- drop down menu -->
				<div class="row" style="background: #eceef1">
					<div class="col text-center user-control">
						<div class="form-group">
							<label for="attraction-category">Choose Category:</label>
							<select id="attraction-category" class="form-control" onchange="updateChart()">
								<option value="all">All Attractions</option>
								<option value="Water Park">Water Park</option>
								<option value="Museum">Museum</option>
								<option value="Theme Park">Theme Park</option>
							</select>
						</div>
					</div>
				</div>

				<!-- Parent container of our bar chart -->
				<div class="row" style="background: #e0e4e8">
					<div class="col">
						<div id="chart-area"></div>
					</div>
				</div>
			</div>

			<!-- Right empty column -->
			<div class="col-2 bg-white"></div>
		</div>
	</div>


	<!-- embedding JS libraries -->
	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>

	<!-- d3 -->
	<script src="https://d3js.org/d3.v7.min.js"></script>


	<!-- Completed: data loading, bar-chart rendering -->
	<script src="js/global-attractions.js"></script>
	<script src="js/barchart.js"></script>

	<script src="js/activity_2.js"></script>
	<script src="js/activity_3.js"></script>
	</body>
</html>
