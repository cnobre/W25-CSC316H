<!doctype html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="description" content="">
    <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>CS171 - Week 4 - HW Solution</title>

  <!-- Include Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.1/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-F3w7mX95PdgyTmZZMECAngseQB83DfGTowi0iMjiWaeVhAn4FJkqJByhZMI3AhiU" crossorigin="anonymous">

  <link rel="stylesheet" href="css/style.css">

    <!-- Load Google Font -->
    <link href="https://fonts.googleapis.com/css?family=Roboto:400,100,300,500,400italic,300italic" rel="stylesheet" type="text/css">
</head>
<body>

    <div class="container wrapper" style="border-radius: 5px; border: thin solid grey; background: rgba(64,64,64,0.09)">

        <!-- header -->
        <div class="row justify-content-center" id="header">
            <h1 class="align-self-center">The World's Tallest Buildings</h1>
        </div>

        <!-- main contents -->
        <div class="row" id="main">

            <!-- left | container for bar chart -->
            <div class="col-md-6" id="chart-area"></div>

            <!-- right | container for info -->
            <div class="col-md-6">

                <!-- wrapper for the building card that can be hidden -->
                <div class="row" id="building-card">
                    <div class="col">

                        <!-- image -->
                        <div class="d-flex justify-content-center" id="building-image"></div>

                        <!-- title -->
                        <div class="row justify-content-center">
                            <div class="align-self-center">
                                <h2 id="building-building"></h2>
                            </div>
                        </div>

                        <!-- info -->
                        <table class="table">
                            <tr><td>Height</td><td><span id="building-height_m"></span>m</td></tr>
                            <tr><td>City</td><td id="building-city"></td></tr>
                            <tr><td>Country</td><td id="building-country"></td></tr>
                            <tr><td>Floors</td><td id="building-floors"></td></tr>
                            <tr><td>Completed</td><td id="building-completed"></td></tr>
                        </table>
                        <div id="building-wikipedia"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- embedding JS libraries -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.1/dist/js/bootstrap.bundle.min.js" integrity="sha384-/bQdsTh/da6pkI1MST/rWKFNjaCP5gBSY4sEBT38Q/9RBh9AH40zEOg7Hlq2THRZ" crossorigin="anonymous"></script>

    <!-- d3 -->
    <script src="https://d3js.org/d3.v7.min.js"></script>

    <!-- Prepare data; display bar chart; click event listener; update DOM -->
    <script src="js/main.js"></script>
  </body>
</html>
