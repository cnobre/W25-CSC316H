<!doctype html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="description" content="">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>CS171 - HW 5</title>


    <!-- CSS LIBRARIES -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.1/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-iYQeCzEYFbKjA/T2uDLTpkwGzCiq6soy8tYaI1GyVh/UjpbCx/TYkiZhlZB6+fzT" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/noUiSlider/15.4.0/nouislider.css" integrity="sha512-DGB74Gyw93qON+V0QxSRs1er6sqoPyFoy23HBL5LN7MRJBcjeCU22zega+vOEGE0XQLoVrv4ExcaesSTwZQA2w==" crossorigin="anonymous" referrerpolicy="no-referrer"/>

    <!-- YOUR CSS -->
    <link rel="stylesheet" href="css/style.css">

</head>
<body>

<div class="container">
    <div class="row" style="height: 80vh; margin-top: 10vh; margin-bottom: 10vh; border: thin solid #4B6D4A; border-radius: 5px">
        <div class="container" style="background: rgba(75,109,74,0.2); padding: 1vw">

            <div class="row">
                <h1>FIFA World Cup<sup>TM</sup></h1>
                <h2>All Time Statistics</h2>
            </div>
            <div class="row">
                <div class="col-md-8">

                    <form class="row g-3">
                        <div class="col-auto">
                            <div class="form-group">
                                <select id="chart-option"  class="form-select form-select-sm mb-3" aria-label=".form-select-lg example" onchange="updateVisualization()"></select>
                            </div>
                        </div>
                        <div class="col-auto">
                            <div class="form-group">
                                <div id="time-period-min" class="range-slider-value"></div>
                                <div id="time-period-slider"></div>
                                <div id="time-period-max" class="range-slider-value"></div>
                            </div>
                        </div>
                    </form>



                    <!-- Parent container for the visualization -->
                    <div id="chart-area"></div>
                </div>
                <div class="col-md-4">
                    <div id="world-cup-edition">
                        <h3 id="details-edition"></h3>
                        <table class="table">
                            <tbody>
                            <tr>
                                <td>Winner</td>
                                <td id="details-winner"></td>
                            </tr>
                            <tr>
                                <td>Goals</td>
                                <td id="details-goals"></td>
                            </tr>
                            <tr>
                                <td>Average Goals</td>
                                <td id="details-avg-goals"></td>
                            </tr>
                            <tr>
                                <td>Matches</td>
                                <td id="details-matches"></td>
                            </tr>
                            <tr>
                                <td>Teams</td>
                                <td id="details-teams"></td>
                            </tr>
                            <tr>
                                <td>Average Attendance</td>
                                <td id="details-attendance"></td>
                            </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>

        </div>
    </div>
</div>


<!-- embedding JS libraries -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.1/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-/bQdsTh/da6pkI1MST/rWKFNjaCP5gBSY4sEBT38Q/9RBh9AH40zEOg7Hlq2THRZ"

<script src="https://cdnjs.cloudflare.com/ajax/libs/noUiSlider/15.4.0/nouislider.min.js"

        crossorigin="anonymous" referrerpolicy="no-referrer"></script>
<!-- d3 -->
<script src="https://d3js.org/d3.v7.min.js"></script>
<script src="js/wNumb.js"></script>


<!-- Your implementation -->
<script src="js/main.js"></script>

</body>
</html>
